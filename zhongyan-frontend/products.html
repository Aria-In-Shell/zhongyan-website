<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="江西中研智能装备产品中心，按容量、用途、材料和产能筛选吹瓶设备。"
    />
    <title>产品中心｜江西中研智能装备有限公司</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header solid" id="top">
      <a class="brand" href="./index.html" aria-label="返回首页">
        <span class="brand-mark">ZY</span>
        <span>
          <strong>江西中研智能装备有限公司</strong>
          <small>Jiangxi Zhongyan Intelligent Equipment Co., Ltd.</small>
        </span>
      </a>

      <button class="nav-toggle" type="button" aria-label="打开导航" data-nav-toggle>☰</button>

      <nav class="nav" data-nav>
        <a href="./index.html">首页</a>
        <a href="./products.html">产品中心</a>
        <a href="./index.html#service">定制服务</a>
        <a href="./index.html#cases">案例展示</a>
        <a href="./index.html#contact">联系我们</a>
      </nav>

      <button class="lang-switch" type="button" title="英文后续统一翻译">中文 / EN</button>
    </header>

    <main class="subpage-main">
      <section class="page-hero">
        <p class="eyebrow">Product Center</p>
        <h1>产品中心</h1>
        <p>按采购视角筛选设备：容量、用途、材料、产能和型号都可以作为入口。</p>
      </section>

      <section class="section equipment-section" id="equipment">
        <div class="product-layout">
          <aside class="filters" aria-label="产品筛选">
            <div class="filter-group">
              <label for="search">型号 / 名称</label>
              <input id="search" type="search" placeholder="例如 ZY-06GS 或 5L" data-filter-search />
            </div>
            <div class="filter-group">
              <label for="capacity">容量</label>
              <select id="capacity" data-filter="capacity"></select>
            </div>
            <div class="filter-group">
              <label for="usage">用途</label>
              <select id="usage" data-filter="usage"></select>
            </div>
            <div class="filter-group">
              <label for="material">材料</label>
              <select id="material" data-filter="material"></select>
            </div>
            <div class="filter-group">
              <label for="output">产能</label>
              <select id="output" data-filter="output"></select>
            </div>
            <button class="button ghost full" type="button" data-reset-filters>重置筛选</button>
          </aside>

          <div>
            <div class="result-bar">
              <strong data-product-count>0</strong>
              <span>台设备匹配当前条件</span>
            </div>
            <div class="product-grid" data-product-grid></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div>
        <strong>江西中研智能装备有限公司</strong>
        <p>地址：江西省宜春经济技术开发区宜春大道6号</p>
      </div>
      <div class="footer-links">
        <a href="./index.html">首页</a>
        <a href="./index.html#cases">案例展示</a>
        <a href="./index.html#contact">联系我们</a>
      </div>
    </footer>

    <dialog class="inquiry-dialog" data-inquiry-dialog>
      <form method="dialog" class="inquiry-form">
        <button class="dialog-close" value="cancel" aria-label="关闭">×</button>
        <p class="eyebrow">Inquiry</p>
        <h2>询价 / 选型需求</h2>
        <div class="form-grid">
          <label>姓名<input type="text" placeholder="请输入姓名" /></label>
          <label>电话<input type="tel" placeholder="请输入电话" /></label>
          <label>邮箱<input type="email" placeholder="用于接收方案，可选" /></label>
          <label>感兴趣产品<input type="text" data-inquiry-product placeholder="可自动带入产品" /></label>
          <label>材料<input type="text" placeholder="PET / PP / 其他" /></label>
          <label>目标容量<input type="text" placeholder="例如 600ml / 5L" /></label>
          <label class="wide">需求描述<textarea rows="4" placeholder="瓶型、产能、预算、是否需要整线等"></textarea></label>
        </div>
        <p class="form-note">原型阶段暂不提交。正式版会接入验证码、频率限制和后台询盘管理。</p>
        <button class="button primary full" value="default">确认需求</button>
      </form>
    </dialog>

    <dialog class="detail-dialog" data-detail-dialog>
      <form method="dialog" class="detail-shell">
        <button class="dialog-close" value="cancel" aria-label="关闭">×</button>
        <div data-detail-content></div>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
